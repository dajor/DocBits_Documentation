  <rect x="32" y="330" width="736" height="44" rx="12" fill="none" stroke="#d97706" stroke-opacity="0.15"/>
  <g transform="translate(50, 344)">
    <circle cx="10" cy="10" r="10" fill="#d97706" opacity="0.15"/>
    <text x="10" y="15" text-anchor="middle" fill="#d97706" font-size="13" font-weight="700">!</text>
  </g>
