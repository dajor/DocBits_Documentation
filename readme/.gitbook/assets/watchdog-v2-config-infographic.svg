  <rect x="122" y="416" width="80" height="18" rx="9" fill="#005cad" opacity="0.08"/>
  <text x="162" y="429" text-anchor="middle" fill="#005cad" font-size="9.5" font-weight="600">Infor IDM</text>

  <rect x="212" y="416" width="84" height="18" rx="9" fill="#005cad" opacity="0.08"/>
