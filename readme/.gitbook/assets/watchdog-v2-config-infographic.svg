  <text x="400" y="36" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700" letter-spacing="0.3">WatchDog Configuration -- 4 Tabs Overview</text>

  <!-- Tab bar background -->
  <rect x="32" y="72" width="736" height="38" rx="10" fill="#f0f3ff"/>

  <!-- Tab 1: General (active) -->
  <rect x="36" y="74" width="172" height="34" rx="8" fill="#005cad"/>
  <text x="122" y="96" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">General</text>

  <!-- Tab 2: Logs -->
